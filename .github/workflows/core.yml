name: Core

on:
  push:
  pull_request:

jobs:
  core:
    name: Core (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-latest
          - name: Windows x64
            os: windows-latest
          - name: macOS arm64
            os: macos-26
          - name: macOS x64
            os: macos-26-intel

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      RUSTC_WRAPPER: ""
      RUSTFLAGS: ""

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install Linux Tauri system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libudev-dev \
            libasound2-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            mold
      - name: Check formatting
        run: cargo fmt --check
      - name: Lint workspace
        run: cargo clippy --workspace
      - name: Test workspace
        run: cargo test --workspace
      - name: Build runtime-min (minimal profile)
        run: cargo build -p runtime-min --no-default-features --features runtime-min
      - name: Build runtime-min (editor profile)
        run: cargo xtask build-editor
      - name: Check Tauri editor backend compiles
        run: cargo check -p varg-editor-tauri
      - name: Agent sandbox and worktree smoke tests
        run: cargo xtask agent-smoke
