name: Core

on:
  push:
  pull_request:

jobs:
  core:
    name: Core (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-latest
          - name: Windows x64
            os: windows-latest
          - name: macOS arm64
            os: macos-14
          - name: macOS x64
            os: macos-13

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Check formatting
        run: cargo fmt --check
      - name: Lint workspace
        run: cargo clippy --workspace
      - name: Test workspace
        run: cargo test --workspace
      - name: Build runtime-min
        run: cargo build -p runtime-min --no-default-features --features runtime-min
      - name: Build editor profile
        run: cargo xtask build-editor
      - name: Build agent-tools profile
        run: cargo build -p runtime-min --no-default-features --features agent-tools
      - name: Agent sandbox and worktree smoke tests
        run: cargo xtask agent-smoke
      - name: Package runtime game
        run: cargo xtask package --profile runtime-game
      - name: Package editor
        run: cargo xtask package --profile editor
