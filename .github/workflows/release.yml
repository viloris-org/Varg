name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to upload artifacts to
        required: true

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-latest
            platform: linux-x64
            bundles: deb,rpm,appimage
          - name: Windows x64
            os: windows-latest
            platform: windows-x64
            bundles: msi,nsis
          - name: macOS arm64
            os: macos-26
            platform: macos-arm64
            bundles: dmg
          - name: macOS x64
            os: macos-26-intel
            platform: macos-x64
            bundles: dmg

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      RUSTC_WRAPPER: ""
      RUSTFLAGS: ""

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Tauri system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libudev-dev \
            libasound2-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            mold

      - uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        working-directory: editor
        run: bun install --frozen-lockfile

      - name: Build Tauri editor
        working-directory: editor
        run: bun tauri build --bundles ${{ matrix.bundles }}

      - name: Prepare release assets
        shell: bash
        run: |
          bundle_root="target/release/bundle"
          if [ ! -d "$bundle_root" ]; then
            bundle_root="editor/src-tauri/target/release/bundle"
          fi
          if [ ! -d "$bundle_root" ]; then
            echo "Tauri bundle output directory not found"
            exit 1
          fi

          mkdir -p "release-assets/${{ matrix.platform }}"
          asset_patterns=(
            "*.AppImage"
            "*.deb"
            "*.rpm"
            "*.msi"
            "*.exe"
            "*.dmg"
          )
          while IFS= read -r -d '' artifact; do
            filename="$(basename "$artifact")"
            cp "$artifact" "release-assets/${{ matrix.platform }}/${{ matrix.platform }}-$filename"
          done < <(
            find "$bundle_root" -maxdepth 2 -type f \( \
              -name "${asset_patterns[0]}" \
              -o -name "${asset_patterns[1]}" \
              -o -name "${asset_patterns[2]}" \
              -o -name "${asset_patterns[3]}" \
              -o -name "${asset_patterns[4]}" \
              -o -name "${asset_patterns[5]}" \
            \) -print0
          )

          find "release-assets/${{ matrix.platform }}" -maxdepth 1 -type f -print

      - uses: actions/upload-artifact@v4
        with:
          name: varg-editor-${{ matrix.platform }}
          path: release-assets/${{ matrix.platform }}/*
          if-no-files-found: error

  upload:
    name: Upload release assets
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: varg-editor-*
          path: release-assets
          merge-multiple: true

      - name: Mark channel releases as prereleases
        shell: bash
        run: |
          case "$RELEASE_TAG" in
            *-beta | *-dev | *-canary)
              gh release edit "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --prerelease
              ;;
            *)
              echo "$RELEASE_TAG is a stable release tag"
              ;;
          esac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Upload assets to release
        shell: bash
        run: |
          mapfile -d '' assets < <(find release-assets -type f -print0)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets found"
            exit 1
          fi

          gh release upload "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --clobber "${assets[@]}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
