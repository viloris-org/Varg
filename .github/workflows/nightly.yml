name: Nightly

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-latest
            platform: linux-x64
            bundles: deb,rpm,appimage
          - name: Windows x64
            os: windows-latest
            platform: windows-x64
            bundles: msi,nsis
          - name: macOS arm64
            os: macos-26
            platform: macos-arm64
            bundles: dmg
          - name: macOS x64
            os: macos-26-intel
            platform: macos-x64
            bundles: dmg

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      RUSTC_WRAPPER: ""
      RUSTFLAGS: ""

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Tauri system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libudev-dev \
            libasound2-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            mold

      - uses: oven-sh/setup-bun@v2

      - name: Build frontend
        working-directory: editor
        run: |
          bun install
          bun run build

      - name: Build Tauri editor (release)
        working-directory: editor
        run: bun tauri build --bundles ${{ matrix.bundles }}

      - name: Prepare release assets
        shell: bash
        run: |
          bundle_root="target/release/bundle"
          if [ ! -d "$bundle_root" ]; then
            bundle_root="editor/src-tauri/target/release/bundle"
          fi
          if [ ! -d "$bundle_root" ]; then
            echo "Tauri bundle output directory not found"
            exit 1
          fi

          mkdir -p "release-assets/${{ matrix.platform }}"
          asset_patterns=(
            "*.AppImage"
            "*.deb"
            "*.rpm"
            "*.msi"
            "*.exe"
            "*.dmg"
          )
          while IFS= read -r -d '' artifact; do
            filename="$(basename "$artifact")"
            cp "$artifact" "release-assets/${{ matrix.platform }}/${{ matrix.platform }}-$filename"
          done < <(
            find "$bundle_root" -maxdepth 2 -type f \( \
              -name "${asset_patterns[0]}" \
              -o -name "${asset_patterns[1]}" \
              -o -name "${asset_patterns[2]}" \
              -o -name "${asset_patterns[3]}" \
              -o -name "${asset_patterns[4]}" \
              -o -name "${asset_patterns[5]}" \
            \) -print0
          )

          find "release-assets/${{ matrix.platform }}" -maxdepth 1 -type f -print

      - uses: actions/upload-artifact@v4
        with:
          name: varg-editor-${{ matrix.platform }}
          path: release-assets/${{ matrix.platform }}/*
          if-no-files-found: error

  release:
    name: Publish nightly release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: varg-editor-*
          path: artifacts
          merge-multiple: true

      - name: Delete old nightly release
        run: gh release delete nightly --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create nightly release
        shell: bash
        run: |
          mapfile -d '' artifacts < <(find artifacts -type f -print0)
          if [ "${#artifacts[@]}" -eq 0 ]; then
            echo "No nightly artifacts found"
            exit 1
          fi
          gh release create nightly \
            --prerelease \
            --title "Nightly Build $(date +%Y-%m-%d)" \
            --notes "Automated nightly build from [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})." \
            "${artifacts[@]}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
