name: Nightly

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-latest
            platform: linux-x64
          - name: Windows x64
            os: windows-latest
            platform: windows-x64
          - name: macOS arm64
            os: macos-14
            platform: macos-arm64
          - name: macOS x64
            os: macos-13
            platform: macos-x64

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Package runtime-game (release)
        run: cargo xtask package --profile runtime-game --release

      - name: Package editor (release)
        run: cargo xtask package --profile editor --release

      - name: Archive packages (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/aster-packages/${{ matrix.platform }}
          for profile in runtime-game editor; do
            tar -czf "aster-${profile}-${{ matrix.platform }}.tar.gz" -C "$profile" .
          done

      - name: Archive packages (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/aster-packages/${{ matrix.platform }}
          foreach ($profile in @("runtime-game", "editor")) {
            Compress-Archive -Path "$profile\*" -DestinationPath "aster-${profile}-${{ matrix.platform }}.zip"
          }

      - uses: actions/upload-artifact@v4
        with:
          name: aster-nightly-${{ matrix.platform }}
          path: |
            target/aster-packages/${{ matrix.platform }}/aster-*.tar.gz
            target/aster-packages/${{ matrix.platform }}/aster-*.zip

  release:
    name: Publish nightly release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: aster-nightly-*
          path: artifacts

      - name: Delete old nightly release
        run: gh release delete nightly --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create nightly release
        run: |
          gh release create nightly \
            --prerelease \
            --title "Nightly Build $(date +%Y-%m-%d)" \
            --notes "Automated nightly build from [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})." \
            artifacts/*/aster-*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
